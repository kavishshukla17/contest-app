databases:
  - name: contest-db
    plan: free

services:
  - type: web
    name: contest-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: contest-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SYNC_JUDGE
        value: "1"
      - key: JUDGE_MODE
        value: auto
      - key: CORS_ORIGIN
        value: https://contest-app-three.vercel.app
      - key: PYTHON_BIN
        value: python3
